  <script type="text/babel">

    // --- KOMPONEN IKON KUSTOM (Pengganti Lucide agar Standalone) ---

      lightbulb: <><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>,
      edit3: <><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></>,
      move: <><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="22"/></>

    const Icon = ({ name, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>

    // --- KONFIGURASI BOT ---
    const PERSONALITIES = {
      senja: {
        id: 'senja',
        name: 'Kak Senja 🌅',
        role: 'Penyembuh Jiwa & Teman Curhat',
        description: 'Teman curhat yang hangat, puitis, penuh empati, dan ahli kesehatan mental.',
        avatar: '🌅',
        themeClass: 'bg-gradient-to-tr from-amber-200 to-rose-200 border-rose-200 text-rose-800',
        bubbleColor: 'bg-rose-50 text-rose-900 border-rose-100',
        primaryColor: 'rose',
        systemPrompt: `Kamu adalah 'Kak Senja', seorang mentor dan teman curhat yang hangat, estetik, puitis, dan penuh empati untuk mahasiswa/anak muda. 
    Gunakan bahasa Indonesia yang santai, lembut, puitis tapi tetap modern. Sering gunakan kata panggilan seperti 'kamu', 'sahabat senja'. Fokus pada memberikan solusi yang menenangkan jiwa.`
      },
      bro: {
        id: 'bro',
        name: 'Bro AI 🛹',
        role: 'Teman Nongkrong & Solusi Instan',
        description: 'Teman nongkrong cowok yang asik, blak-blakan, solutif, anti-mager.',
        avatar: '🛹',
        themeClass: 'bg-gradient-to-tr from-sky-200 to-blue-200 border-blue-200 text-blue-800',
        bubbleColor: 'bg-sky-50 text-blue-900 border-sky-100',
        primaryColor: 'sky',
        systemPrompt: `Kamu adalah 'Bro AI', teman nongkrong cowok yang asik, santai, ceplas-ceplos, tapi pinter banget.
    Gunakan bahasa gaul anak muda Jakarta secara natural (pake lu, gue, mager, gokil, chill). Jawab pertanyaan dengan singkat, padat, praktis, dan diselingi candaan santai.`
      },
      geni: {
        id: 'geni',
        name: 'Z-Geni 🔥',
        role: 'Sohibat Tren & Ide Kreatif',
        description: 'Hiperaktif, ekspresif, up-to-date pop culture, seru abis diajak brainstorming.',
        avatar: '🔥',
        themeClass: 'bg-gradient-to-tr from-purple-200 to-pink-200 border-pink-200 text-pink-800',
        bubbleColor: 'bg-pink-50 text-pink-900 border-pink-100',
        primaryColor: 'pink',
        systemPrompt: `Kamu adalah 'Z-Geni', asisten AI berenergi tinggi dengan kepribadian Gen-Z.
    Sering gunakan emoji. Gunakan istilah tren Gen-Z (slay, fr fr, no cap, rizz, menyala abangku). Kamu sangat ekspresif, up-to-date pop culture, dan gaya ketikanmu kadang lowercase aesthetic.`
      },
      pro: {

        name: 'Pro-Bot 🎓',
        role: 'Mentor Skripsi & Karier',

        themeClass: 'bg-gradient-to-tr from-emerald-200 to-teal-200 border-emerald-200 text-emerald-800',
        bubbleColor: 'bg-emerald-50 text-emerald-900 border-emerald-100',
        primaryColor: 'emerald',
        systemPrompt: `Kamu adalah 'Pro-Bot', asisten akademis dan perencana karier yang cerdas, terstruktur, profesional namun ramah mahasiswa.
    Gunakan bahasa Indonesia yang baik, rapi, informatif, dan terorganisir (gunakan poin-poin). Bantulah pengguna membuat outline skripsi, persiapan wawancara, dan ide akademis.`

    };

    // --- KONFIGURASI TOOLBOX ---
    const TOOLS = {
      rewriter: {
        id: 'rewriter',
        name: 'Academic Rewriter',
        icon: <Icon name="edit3" className="w-5 h-5 text-amber-500" />,
        description: 'Ubah teks santai jadi bahasa formal untuk dosen/email profesional.',
        systemPrompt: "Kamu adalah asisten editor akademis yang profesional. Tugasmu adalah mengubah input teks dari mahasiswa menjadi bahasa yang sangat formal, sopan, dan akademis untuk keperluan email dosen, surat resmi, atau tugas kuliah.",
        placeholder: "Contoh: 'Pak, saya telat ngumpul tugas karena sakit, maaf ya pak'..."
      },
      summarizer: {
        id: 'summarizer',
        name: 'Smart Summarizer',
        icon: <Icon name="fileText" className="w-5 h-5 text-sky-500" />,
        description: 'Rangkum catatan kuliah panjang jadi poin-poin singkat yang mudah diingat.',
        systemPrompt: "Kamu adalah asisten perangkum yang efisien. Ringkas teks yang diberikan menjadi poin-poin (bullet points) yang padat, jelas, menggunakan bahasa yang mudah dipahami mahasiswa untuk belajar ujian.",
        placeholder: "Tempel catatan kuliah, jurnal, atau paragraf panjang di sini..."
      },
      ideator: {
        id: 'ideator',
        name: 'Idea Generator',
        icon: <Icon name="lightbulb" className="w-5 h-5 text-emerald-500" />,
        description: 'Buntu ide? Brainstorming judul skripsi, esai, atau proyek kreatif.',
        systemPrompt: "Kamu adalah mitra brainstorming kreatif untuk mahasiswa. Berikan minimal 5 ide inovatif, unik, dan relevan dengan topik yang diberikan. Sertakan sedikit penjelasan mengapa ide tersebut menarik untuk diangkat.",
        placeholder: "Contoh: 'Ide proyek akhir untuk jurusan Sistem Informasi tentang lingkungan'..."
      }
    };

    const MOTIVATIONAL_QUOTES = [
      "“Gak apa-apa capek, namanya juga lagi berjuang. Jangan lupa napas ya.” — Kak Senja 🌅",
      "“Skripsi yang baik adalah skripsi yang selesai, bukan yang sempurna.” — Pro-Bot 🎓",
      "“Santai aja bro, hari esok masih ada. Satu langkah kecil lebih baik daripada diem.” — Bro AI 🛹",
      "“You are doing great fr fr! Jangan dibandingin speed orang lain sama speed kamu ✨” — Z-Geni 🔥"
    ];

    const INITIAL_MOODS = [
      { emoji: '🤩', label: 'Ambis', desc: 'Lagi semangat belajar!', text: 'Aku lagi semangat banget belajar nih! Kasih aku tantangan/ide produktif dong.' },
      { emoji: '🤯', label: 'Burnout', desc: 'Capek tugas numpuk', text: 'Aku capek banget, tugas numpuk parah. Butuh dengerin curhatku sebentar.' },
      { emoji: '🫠', label: 'Gabut', desc: 'Gak tahu mau ngapain', text: 'Lagi super gabut nih. Kasih rekomendasi aktivitas seru atau obrolan santai dong.' },
      { emoji: '🥺', label: 'Overthink', desc: 'Mikirin masa depan', text: 'Lagi overthinking soal masa depan/karier. Gimana caranya biar tetap tenang ya?' }
    ];

    function App() {
      // Navigation & Mode States
      const [activeMode, setActiveMode] = useState('chat'); // 'chat' atau 'tools'
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [showNotification, setShowNotification] = useState(null);
      
      // Chat States
      const [selectedBot, setSelectedBot] = useState('senja');
      const [currentMood, setCurrentMood] = useState(null);
      const [messages, setMessages] = useState([
        {
          id: 'welcome',
          sender: 'bot',
          text: 'Halo! Aku **Kak Senja**. Selamat datang di ruang amanmu. Hari ini mau santai ngobrol di menu **Chat**, atau mau pakai **Toolbox Ambis** buat ngerjain tugas? ✨',
          timestamp: new Date()
        }
      ]);
      const [inputText, setInputText] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const messagesEndRef = useRef(null);

      // Tools States
      const [activeTool, setActiveTool] = useState('rewriter');
      const [toolInput, setToolInput] = useState('');
      const [toolOutput, setToolOutput] = useState('');

      // API & Features States
      const [customApiKey, setCustomApiKey] = useState('');
      const [showConfig, setShowConfig] = useState(false);
      const [activeQuote, setActiveQuote] = useState(MOTIVATIONAL_QUOTES[0]);

      // Audio State (BUG FIX TERAPLIKASI)
      const [soundPlaying, setSoundPlaying] = useState(false);
      const audioContextRef = useRef(null);

      // Widget/Pomodoro States
      const [pomoOpen, setPomoOpen] = useState(false);
      const [pomoTime, setPomoTime] = useState(25 * 60); 
      const [pomoActive, setPomoActive] = useState(false);
      const [pomoMode, setPomoMode] = useState('study'); 
      const [widgetPos, setWidgetPos] = useState({ x: 0, y: 0 });
      const [isWidgetPosInit, setIsWidgetPosInit] = useState(false);
      
      // Ref untuk drag logic widget
      const dragRef = useRef({
        isDragging: false, moved: false, startX: 0, startY: 0, lastX: 0, lastY: 0
      });

      // Auto-scroll percakapan
      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };
      useEffect(() => { scrollToBottom(); }, [messages, isTyping]);

      // Mengatur Posisi Aman Widget saat Layar Di-resize
      useEffect(() => {
        const initX = window.innerWidth - 100;
        const initY = window.innerHeight - 150;
        setWidgetPos({ x: initX, y: initY });
        dragRef.current.lastX = initX;
        dragRef.current.lastY = initY;
        setIsWidgetPosInit(true);

        const handleResize = () => {
          setWidgetPos(prev => {
            const newX = Math.min(prev.x, window.innerWidth - 80);
            const newY = Math.min(prev.y, window.innerHeight - 80);
            dragRef.current.lastX = newX;
            dragRef.current.lastY = newY;
            return { x: newX, y: newY };
          });
        };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      // Pomodoro Logic
      useEffect(() => {
        let interval = null;
        if (pomoActive && pomoTime > 0) {
          interval = setInterval(() => setPomoTime((prev) => prev - 1), 1000);
        } else if (pomoTime === 0 && pomoActive) {
          clearInterval(interval);
          if (pomoMode === 'study') {
            setPomoMode('break'); setPomoTime(5 * 60);
            triggerNotification('Waktu belajar selesai! Istirahat 5 menit ☕');
          } else {
            setPomoMode('study'); setPomoTime(25 * 60);
            triggerNotification('Waktu istirahat selesai! Lanjut fokus 💪');
          }
          setPomoActive(false);
        }
        return () => clearInterval(interval);
      }, [pomoActive, pomoTime, pomoMode]);

      // Audio/Soundscape Logic (BUG FIX DENGAN SUSPEND/RESUME)
      const toggleSoundscape = async () => {
        try {
          if (!audioContextRef.current) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return triggerNotification("Browser tidak mendukung audio relaksasi.");
            
            const ctx = new AudioContext();
            audioContextRef.current = ctx;

            const bufferSize = 2 * ctx.sampleRate;
            const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

            const whiteNoise = ctx.createBufferSource();
            whiteNoise.buffer = noiseBuffer;
            whiteNoise.loop = true;

            const lowpassFilter = ctx.createBiquadFilter();
            lowpassFilter.type = 'lowpass';
            lowpassFilter.frequency.value = 350;

            const gainNode = ctx.createGain();
            gainNode.gain.value = 0.12;

            whiteNoise.connect(lowpassFilter);
            lowpassFilter.connect(gainNode);
            gainNode.connect(ctx.destination);

            whiteNoise.start();
            setSoundPlaying(true);
            triggerNotification('Soundscape Hujan Lembut aktif! 🎧');
          } else {
            // Gunakan state aman
            if (audioContextRef.current.state === 'running') {
              await audioContextRef.current.suspend();
              setSoundPlaying(false);
              triggerNotification('Soundscape dihentikan.');
            } else if (audioContextRef.current.state === 'suspended') {
              await audioContextRef.current.resume();
              setSoundPlaying(true);
              triggerNotification('Soundscape dilanjutkan! 🎧');
            }
          }
        } catch (err) {
          console.error(err);
          triggerNotification('Gagal memutar audio.');
        }
      };

      // API Call Wrapper (BUG FIX API KEY KOSONG)
      const callGeminiAPI = async (userQuery, systemPrompt) => {
        const apiKey = ""; // Kunci diinjeksikan secara otomatis di runtime
        const activeKey = customApiKey.trim() !== '' ? customApiKey.trim() : apiKey;
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeKey}`;

        const payload = {
          contents: [{ parts: [{ text: userQuery }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] }
        };

        let delay = 1000;
        const maxRetries = 5;

        for (let i = 0; i < maxRetries; i++) {
          try {
            const response = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (response.ok) {
              const result = await response.json();
              const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
              if (text) return text;
              throw new Error('Respon API kosong');
            }

            if (response.status === 429) {
              await new Promise(resolve => setTimeout(resolve, delay));
              delay *= 2;
              continue;
            }

            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error?.message || `HTTP error! status: ${response.status}`);
          } catch (err) {
            if (i === maxRetries - 1) throw err;
            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2;
          }
        }
      };

      // Chat Send Logic
      const handleSendMessage = async (textToSend) => {
        const text = textToSend || inputText;
        if (!text.trim()) return;

        setMessages(prev => [...prev, { id: `user-${Date.now()}`, sender: 'user', text, timestamp: new Date() }]);
        if (!textToSend) setInputText('');
        setIsTyping(true);

        try {
          const currentBot = PERSONALITIES[selectedBot];
          let contextQuery = text;
          if (currentMood) {
            contextQuery = `[Konteks Mood Pengguna Saat Ini: ${currentMood.label} - ${currentMood.desc}]. Pertanyaan pengguna: ${text}`;
          }

          const botResponse = await callGeminiAPI(contextQuery, currentBot.systemPrompt);
          
          setMessages(prev => [...prev, { id: `bot-${Date.now()}`, sender: 'bot', text: botResponse, timestamp: new Date() }]);
        } catch (err) {
          setMessages(prev => [...prev, { id: `err-${Date.now()}`, sender: 'bot', text: `Koneksi sedang bermasalah. Coba lagi ya!\n\n*(Detail Error: ${err.message || 'Gagal terhubung'})*`, timestamp: new Date(), isError: true }]);
        } finally {
          setIsTyping(false);
        }
      };

      // Tool Submit Logic
      const handleToolSubmit = async () => {
        if (!toolInput.trim()) return;
        setIsTyping(true);
        try {
          const res = await callGeminiAPI(toolInput, TOOLS[activeTool].systemPrompt);
          setToolOutput(res);
        } catch (err) {
          setToolOutput(`Gagal memproses data. Silakan periksa koneksi Anda.\nDetail: ${err.message}`);
        } finally {
          setIsTyping(false);
        }
      };

      // Drag Logic Untuk Widget Pomodoro
      const handlePointerDown = (e) => {
        // Cegah seleksi teks saat menyeret widget
        document.body.style.userSelect = 'none';
        dragRef.current = {
          isDragging: true, moved: false,
          startX: e.clientX || (e.touches && e.touches[0].clientX),
          startY: e.clientY || (e.touches && e.touches[0].clientY),
          lastX: widgetPos.x, lastY: widgetPos.y
        };

        const handlePointerMove = (moveEvent) => {
          if (!dragRef.current.isDragging) return;
          const clientX = moveEvent.clientX || (moveEvent.touches && moveEvent.touches[0].clientX);
          const clientY = moveEvent.clientY || (moveEvent.touches && moveEvent.touches[0].clientY);
          
          const dx = clientX - dragRef.current.startX;
          const dy = clientY - dragRef.current.startY;
          
          // Jika geser lebih dari 5px, tandai sebagai 'moved' bukan 'click'
          if (Math.abs(dx) > 5 || Math.abs(dy) > 5) dragRef.current.moved = true;

          let newX = Math.max(10, Math.min(dragRef.current.lastX + dx, window.innerWidth - 80));
          let newY = Math.max(10, Math.min(dragRef.current.lastY + dy, window.innerHeight - 80));
          setWidgetPos({ x: newX, y: newY });
        };

        const handlePointerUp = () => {
          document.body.style.userSelect = '';
          if (dragRef.current.isDragging) {
            dragRef.current.lastX = widgetPos.x;
            dragRef.current.lastY = widgetPos.y;
          }
          dragRef.current.isDragging = false;
          document.removeEventListener('mousemove', handlePointerMove);
          document.removeEventListener('mouseup', handlePointerUp);
          document.removeEventListener('touchmove', handlePointerMove);
          document.removeEventListener('touchend', handlePointerUp);
        };

        document.addEventListener('mousemove', handlePointerMove);
        document.addEventListener('mouseup', handlePointerUp);
        document.addEventListener('touchmove', handlePointerMove, { passive: false });
        document.addEventListener('touchend', handlePointerUp);
      };

      // Helper Functions
      const handleMoodSelect = (mood) => { setCurrentMood(mood); triggerNotification(`Mood: ${mood.label}`); handleSendMessage(mood.text); };
      const rollNewQuote = () => { setActiveQuote(MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)]); triggerNotification('Kutipan diperbarui!'); };
      const triggerNotification = (msg) => { setShowNotification(msg); setTimeout(() => setShowNotification(null), 3000); };
      const handleClearChat = () => { handleBotChange(selectedBot); triggerNotification('Riwayat chat dibersihkan!'); };
      const formatPomoTime = () => `${Math.floor(pomoTime / 60).toString().padStart(2, '0')}:${(pomoTime % 60).toString().padStart(2, '0')}`;

      const renderMessageContent = (text) => {
        if (typeof text !== 'string') return <div className="text-slate-700" />;
        let f = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        f = f.replace(/```([\s\S]*?)```/g, (m, c) => `<pre class="bg-slate-900 text-teal-300 p-4 rounded-2xl my-3 font-mono text-xs overflow-x-auto border border-slate-800">${c.trim()}</pre>`);
        f = f.replace(/`([^`]+)`/g, '<code class="bg-white text-emerald-700 px-1.5 py-0.5 rounded font-mono text-xs border border-slate-200 shadow-sm">$1</code>');
        f = f.replace(/\*\*([^*]+)\*\*/g, '<strong class="font-bold text-slate-800">$1</strong>');
        f = f.replace(/^\s*[-*]\s+(.+)$/gm, '<li class="list-disc ml-4 my-1 text-slate-700">$1</li>');
        return <div className="text-slate-700 leading-relaxed" dangerouslySetInnerHTML={{ __html: f.replace(/\n/g, '<br />') }} />;
      };

      const handleBotChange = (botId) => {
        setSelectedBot(botId);
        setSidebarOpen(false);
        setCurrentMood(null);
        setMessages([{ id: Date.now().toString(), sender: 'bot', text: `Halo! Ini ${PERSONALITIES[botId].name}. Udah siap ngobrol atau mau ngerjain tugas pake fitur Toolbox?`, timestamp: new Date() }]);
      };

      return (
        <div className="flex h-screen bg-[#FDFBF7] text-slate-800 font-sans overflow-hidden">
          
          {/* TOAST NOTIFIKASI */}
          {showNotification && (
            <div className="fixed top-5 right-5 z-50 bg-white border border-emerald-100 text-emerald-800 px-4 py-3 rounded-2xl shadow-xl shadow-emerald-100 flex items-center gap-2.5 animate-fade-in">
              <div className="w-2 h-2 rounded-full bg-emerald-500 animate-ping" />
              <span className="text-xs font-bold tracking-wide">{showNotification}</span>
            </div>
          )}

          {/* SIDEBAR */}
          <div className={`fixed inset-y-0 left-0 z-40 w-80 bg-[#FAF7F2] border-r border-[#EBE7DF] flex flex-col transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-6 border-b border-[#EBE7DF] flex justify-between items-center bg-[#F5F1E8]/30">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-2xl bg-gradient-to-tr from-emerald-500 to-teal-400 flex items-center justify-center shadow-md shadow-emerald-200">
                  <Icon name="sparkles" className="w-5 h-5 text-white" />
                </div>
                <div>
                  <h1 className="font-black text-lg tracking-tight text-slate-800 flex items-center gap-1">
                    SambatAI <span className="text-[10px] bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-full font-bold">PRO</span>
                  </h1>
                  <p className="text-[10px] text-emerald-700 font-mono tracking-wider uppercase font-semibold">Ruang Santai & Ambis</p>
                </div>
              </div>
              <button className="md:hidden p-2 rounded-xl hover:bg-slate-200 text-slate-500" onClick={() => setSidebarOpen(false)}><Icon name="x" className="w-5 h-5" /></button>
            </div>

            <div className="p-4 space-y-2 border-b border-[#EBE7DF]">
              <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider px-2 mb-2">Pilih Mode Belajar</h2>
              <button onClick={() => setActiveMode('chat')} className={`w-full p-3.5 rounded-2xl flex items-center gap-3 transition-all font-bold text-sm ${activeMode === 'chat' ? 'bg-white border border-emerald-500/30 text-emerald-700 shadow-sm' : 'bg-transparent text-slate-600 hover:bg-white hover:border-slate-200 border border-transparent'}`}>
                <Icon name="sparkles" className="w-4 h-4"/> Ngobrol Santai (Chat)
              </button>
              <button onClick={() => setActiveMode('tools')} className={`w-full p-3.5 rounded-2xl flex items-center gap-3 transition-all font-bold text-sm ${activeMode === 'tools' ? 'bg-white border border-emerald-500/30 text-emerald-700 shadow-sm' : 'bg-transparent text-slate-600 hover:bg-white hover:border-slate-200 border border-transparent'}`}>
                <Icon name="layers" className="w-4 h-4"/> Toolbox Ambis (Tugas)
              </button>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-4">
              {activeMode === 'chat' && (
                <div>
                  <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider px-2 mb-3">Ganti Karakter AI 🎭</h2>
                  <div className="space-y-2.5">
                    {Object.values(PERSONALITIES).map((bot) => (
                      <button key={bot.id} onClick={() => handleBotChange(bot.id)} className={`w-full text-left p-3 rounded-2xl border transition-all duration-300 flex gap-3.5 items-start ${selectedBot === bot.id ? 'bg-white border-emerald-500/40 shadow-sm' : 'bg-[#F5F2EC]/40 border-transparent hover:bg-white hover:border-slate-200/80'}`}>
                        <div className={`w-10 h-10 rounded-xl bg-gradient-to-tr ${bot.themeClass} flex items-center justify-center text-xl shrink-0 shadow-sm`}>{bot.avatar}</div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center justify-between">
                            <span className="font-bold text-sm text-slate-800">{bot.name}</span>
                            {selectedBot === bot.id && <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>}
                          </div>
                          <span className="text-[10px] text-slate-500 font-semibold block mt-0.5">{bot.role}</span>
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              )}
              {activeMode === 'tools' && (
                <div className="bg-emerald-50/50 p-4 rounded-3xl border border-emerald-100">
                  <h3 className="text-xs font-bold text-emerald-800 mb-2 flex items-center gap-1.5"><Icon name="info" className="w-4 h-4"/> Info Toolbox</h3>
                  <p className="text-xs text-emerald-700/80 leading-relaxed">Pilih alat bantu akademis di area kanan. Sistem akan merespons langsung sesuai prompt terstruktur untuk hasil tulisan/tugas terbaik.</p>
                </div>
              )}
            </div>

            <div className="p-4 border-t border-[#EBE7DF] bg-[#F5F1E8]/30 space-y-3">
              <button onClick={() => setShowConfig(!showConfig)} className="w-full py-2.5 px-3 rounded-xl text-xs bg-white hover:bg-slate-50 border border-[#EBE7DF] transition flex items-center justify-between font-semibold text-slate-600 shadow-sm">
                <span className="flex items-center gap-2"><Icon name="zap" className="w-3.5 h-3.5 text-amber-500" /> API Key Sendiri</span>
                <span className="text-[9px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded-md font-bold uppercase">{customApiKey ? 'Aktif' : 'Bawaan'}</span>
              </button>
              {showConfig && (
                <div className="p-3 rounded-xl bg-white border border-slate-200 space-y-2.5 animate-fade-in shadow-inner">
                  <input type="password" placeholder="Masukkan API Key Gemini..." value={customApiKey} onChange={(e) => setCustomApiKey(e.target.value)} className="w-full px-3 py-2 rounded-lg bg-slate-50 border border-slate-200 text-xs text-slate-700 focus:outline-none focus:border-emerald-500 shadow-inner" />
                  {customApiKey && <button onClick={() => { setCustomApiKey(''); triggerNotification('API default diaktifkan.'); }} className="text-[10px] text-rose-500 hover:underline block text-right font-semibold">Reset</button>}
                </div>
              )}
            </div>
          </div>

          {sidebarOpen && <div className="fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-30 md:hidden" onClick={() => setSidebarOpen(false)} />}

          {/* MAIN CONTENT AREA */}
          <div className="flex-1 flex flex-col h-full relative">
            <header className="h-20 border-b border-[#EBE7DF] px-4 md:px-6 flex items-center justify-between bg-white/80 backdrop-blur-md sticky top-0 z-10 shadow-sm">
              <div className="flex items-center gap-3">
                <button className="md:hidden p-2 rounded-xl hover:bg-slate-100 text-slate-600" onClick={() => setSidebarOpen(true)}><Icon name="menu" className="w-6 h-6" /></button>
                <div className="flex items-center gap-3">
                  {activeMode === 'chat' ? (
                    <>
                      <div className={`w-11 h-11 rounded-2xl bg-gradient-to-tr ${PERSONALITIES[selectedBot].themeClass} flex items-center justify-center text-2xl shadow-inner`}><span className="drop-shadow-sm">{PERSONALITIES[selectedBot].avatar}</span></div>
                      <div>
                        <div className="flex items-center gap-2"><h2 className="font-extrabold text-slate-800 tracking-tight">{PERSONALITIES[selectedBot].name}</h2><span className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span></div>
                        <p className="text-xs text-slate-500 font-semibold">{PERSONALITIES[selectedBot].role}</p>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="w-11 h-11 rounded-2xl bg-gradient-to-tr from-emerald-100 to-teal-100 border border-emerald-200 flex items-center justify-center text-emerald-600 shadow-inner"><Icon name="layers" className="w-6 h-6" /></div>
                      <div><h2 className="font-extrabold text-slate-800 tracking-tight">Toolbox Ambis</h2><p className="text-xs text-emerald-600 font-semibold">Area Fokus Akademis</p></div>
                    </>
                  )}
                </div>
              </div>

              <div className="flex items-center gap-2">
                <button onClick={toggleSoundscape} className={`p-2.5 rounded-2xl border transition-all flex items-center gap-1.5 text-xs font-bold shadow-sm ${soundPlaying ? 'bg-emerald-50 border-emerald-200 text-emerald-700 animate-pulse' : 'bg-white border-stone-200 text-slate-600 hover:bg-slate-50'}`} title="Suara Hujan">
                  {soundPlaying ? <Icon name="volume2" className="w-4 h-4" /> : <Icon name="volumeX" className="w-4 h-4" />}
                  <span className="hidden lg:inline">{soundPlaying ? 'Hujan Aktif' : 'Suara Hujan'}</span>
                </button>
                {activeMode === 'chat' && (
                  <button onClick={handleClearChat} className="p-2.5 rounded-2xl bg-white hover:bg-rose-50 text-slate-500 hover:text-rose-600 border border-stone-200 transition-colors flex items-center gap-1.5 text-xs font-bold shadow-sm">
                    <Icon name="trash2" className="w-4 h-4" /><span className="hidden sm:inline">Reset Chat</span>
                  </button>
                )}
              </div>
            </header>

            <div className="flex-1 overflow-y-auto bg-[#FAF9F5] flex flex-col">
              {activeMode === 'chat' ? (
                <>
                  <div className="bg-gradient-to-r from-emerald-50/80 via-amber-50/80 to-teal-50/80 border-b border-stone-200 px-4 py-3 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs">
                    <div className="flex items-center gap-2"><span className="text-lg">✨</span><p className="text-slate-600 italic font-medium">{activeQuote}</p></div>
                    <button onClick={rollNewQuote} className="text-[10px] bg-white border border-stone-200 hover:bg-stone-100 text-slate-600 px-3 py-1.5 rounded-full font-bold shadow-sm shrink-0">Ganti Kutipan 🔮</button>
                  </div>

                  <div className="flex-1 p-4 md:p-6 space-y-6">
                    <div className="bg-white border border-slate-200 rounded-3xl p-5 shadow-sm shadow-slate-200/50 max-w-2xl mx-auto mb-6">
                      <div className="text-center mb-3"><span className="text-[10px] font-bold text-emerald-700 uppercase bg-emerald-50 px-3 py-1 rounded-full">{currentMood ? `Mood: ${currentMood.emoji} ${currentMood.label}` : 'Gimana Perasaanmu?'}</span></div>
                      <div className="grid grid-cols-4 gap-2">
                        {INITIAL_MOODS.map(m => (
                          <button key={m.label} onClick={() => handleMoodSelect(m)} className={`flex flex-col items-center p-2.5 rounded-2xl border transition-all ${currentMood?.label === m.label ? 'bg-emerald-50 border-emerald-300 scale-105 shadow-sm' : 'bg-[#FAF9F5]/50 border-transparent hover:bg-white hover:border-slate-200'}`}>
                            <span className="text-2xl mb-1 filter drop-shadow-sm">{m.emoji}</span><span className="text-[10px] font-bold text-slate-700">{m.label}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    {messages.map((msg) => (
                      <div key={msg.id} className={`flex gap-3 md:gap-4 ${msg.sender === 'bot' ? 'justify-start' : 'justify-end'} animate-fade-in`}>
                        {msg.sender === 'bot' && <div className={`w-10 h-10 rounded-xl bg-gradient-to-tr ${PERSONALITIES[selectedBot].themeClass} flex items-center justify-center text-lg shadow-sm shrink-0 self-end mb-1`}><span className="drop-shadow-sm">{PERSONALITIES[selectedBot].avatar}</span></div>}
                        <div className="max-w-[85%] md:max-w-[70%] flex flex-col">
                          <div className={`px-5 py-3.5 rounded-3xl text-sm border shadow-sm ${msg.sender === 'bot' ? `${PERSONALITIES[selectedBot].bubbleColor} rounded-bl-none` : 'bg-emerald-600 border-emerald-500 text-white rounded-br-none'}`}>
                            {msg.sender === 'bot' ? renderMessageContent(msg.text) : <p className="font-medium text-white">{msg.text}</p>}
                          </div>
                          <span className={`text-[9px] text-slate-400 font-semibold mt-1.5 ${msg.sender === 'bot' ? 'text-left pl-2' : 'text-right pr-2'}`}>{msg.timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                        </div>
                        {msg.sender === 'user' && <div className="w-10 h-10 rounded-xl bg-white border border-stone-200 flex items-center justify-center text-emerald-700 shadow-sm shrink-0 self-end mb-1"><Icon name="user" className="w-5 h-5" /></div>}
                      </div>
                    ))}

                    {isTyping && (
                      <div className="flex gap-3 justify-start animate-pulse">
                        <div className={`w-10 h-10 rounded-xl bg-gradient-to-tr ${PERSONALITIES[selectedBot].themeClass} flex items-center justify-center text-lg shrink-0 self-end mb-1`}><span className="drop-shadow-sm">{PERSONALITIES[selectedBot].avatar}</span></div>
                        <div className={`px-5 py-4 rounded-3xl rounded-bl-none text-sm ${PERSONALITIES[selectedBot].bubbleColor} border flex gap-2`}><div className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-bounce"></div><div className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-bounce" style={{animationDelay:'150ms'}}></div><div className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-bounce" style={{animationDelay:'300ms'}}></div></div>
                      </div>
                    )}
                    <div ref={messagesEndRef} />
                  </div>

                  <div className="p-4 md:p-6 border-t border-[#EBE7DF] bg-white">
                    <form onSubmit={(e) => { e.preventDefault(); handleSendMessage(); }} className="relative flex items-center max-w-4xl mx-auto">
                      <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder={`Sambat apa aja dengan ${PERSONALITIES[selectedBot].name}...`} className="w-full bg-[#FAF9F5] border border-slate-200 text-slate-800 placeholder-slate-400 text-sm pl-5 pr-16 py-4 rounded-3xl focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all shadow-inner" disabled={isTyping} />
                      <div className="absolute right-2.5 flex items-center gap-1">
                        <button type="submit" disabled={!inputText.trim() || isTyping} className={`p-3 rounded-2xl flex justify-center transition-all ${inputText.trim() && !isTyping ? 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-md shadow-emerald-200' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}><Icon name="send" className="w-5 h-5" /></button>
                      </div>
                    </form>
                  </div>
                </>
              ) : (
                <div className="flex-1 p-4 md:p-8 overflow-y-auto w-full max-w-5xl mx-auto animate-fade-in space-y-6">
                  <div className="text-center space-y-2 mb-8">
                    <h2 className="text-2xl font-black text-slate-800">Alat Tempur Mahasiswa 🛠️</h2>
                    <p className="text-slate-500 text-sm">Pilih AI terfokus untuk membantumu mengolah tugas dengan hasil yang profesional.</p>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    {Object.values(TOOLS).map(t => (
                      <button key={t.id} onClick={() => setActiveTool(t.id)} className={`p-5 rounded-3xl border-2 text-left transition-all ${activeTool === t.id ? 'border-emerald-500 bg-emerald-50/50 shadow-md shadow-emerald-100' : 'bg-white border-stone-200 hover:border-emerald-300 hover:shadow-sm'}`}>
                        <div className="flex items-center gap-3 mb-2">
                          <div className={`p-2 rounded-xl bg-white shadow-sm border border-slate-100`}>{t.icon}</div>
                          <span className="font-bold text-sm text-slate-800">{t.name}</span>
                        </div>
                        <div className="text-[11px] text-slate-500 leading-relaxed font-medium">{t.description}</div>
                      </button>
                    ))}
                  </div>

                  <div className="grid md:grid-cols-2 gap-6 items-start">
                    <div className="space-y-3">
                      <label className="text-xs font-bold text-slate-500 uppercase tracking-wider ml-2">Input Teks Kamu</label>
                      <textarea 
                        className="w-full h-64 p-5 rounded-3xl border border-stone-200 bg-white focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition shadow-inner resize-none text-sm leading-relaxed text-slate-700" 
                        value={toolInput} onChange={e => setToolInput(e.target.value)}
                        placeholder={TOOLS[activeTool].placeholder}
                      />
                      <button onClick={handleToolSubmit} disabled={isTyping || !toolInput.trim()} className={`w-full py-4 rounded-2xl font-bold text-sm transition-all shadow-md flex justify-center items-center gap-2 ${toolInput.trim() && !isTyping ? 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-emerald-200 hover:-translate-y-0.5' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                        {isTyping ? <><Icon name="refreshCw" className="w-5 h-5 animate-spin" /> Memproses AI...</> : <><Icon name="sparkles" className="w-5 h-5" /> Jalankan {TOOLS[activeTool].name}</>}
                      </button>
                    </div>

                    <div className="space-y-3">
                      <label className="text-xs font-bold text-emerald-600 uppercase tracking-wider ml-2">Hasil dari AI ✨</label>
                      <div className={`w-full h-64 p-6 rounded-3xl border overflow-y-auto text-sm leading-relaxed relative ${toolOutput ? 'bg-white border-emerald-200 shadow-sm shadow-emerald-50 text-slate-700' : 'bg-stone-50 border-stone-200 flex items-center justify-center border-dashed'}`}>
                        {toolOutput ? ( renderMessageContent(toolOutput) ) : (
                          <div className="text-center text-slate-400">
                            <Icon name="fileText" className="w-8 h-8 mx-auto mb-2 opacity-50"/>
                            Hasil tulisan akan muncul di sini.
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* DRAGGABLE POMODORO WIDGET (Sesuai Desain Screenshot) */}
            {isWidgetPosInit && (
              <div 
                className="fixed z-50 flex flex-col items-end"
                style={{ top: widgetPos.y, left: widgetPos.x }}
              >
                {/* Pop-up Timer */}
                {pomoOpen && (
                  <div className="bg-white rounded-[28px] p-6 shadow-[0_10px_40px_-10px_rgba(0,0,0,0.2)] w-[280px] mb-4 cursor-default animate-fade-in absolute bottom-full right-0 origin-bottom-right border border-slate-100">
                    
                    <div className="flex items-center justify-between mb-6">
                      <span className="flex items-center gap-2 text-[15px] font-black text-[#1e293b]">
                        <Icon name="coffee" className="w-5 h-5 text-[#059669]" />
                        Ruang Fokus
                      </span>
                      <div className="flex items-center gap-3">
                        <button 
                          onMouseDown={handlePointerDown} 
                          onTouchStart={handlePointerDown} 
                          className="text-slate-400 hover:text-slate-600 cursor-grab active:cursor-grabbing"
                          title="Geser Widget"
                        >
                          <Icon name="move" className="w-4 h-4" />
                        </button>
                        <button onClick={() => setPomoOpen(false)} className="text-slate-400 hover:text-slate-600">
                          <Icon name="x" className="w-4 h-4" />
                        </button>
                      </div>
                    </div>

                    <div className="text-center mb-6">
                      <span className="text-[3.25rem] font-black text-[#1e293b] tracking-tight font-mono leading-none block mb-3">
                        {formatPomoTime()}
                      </span>
                      <span className={`text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-widest
                        ${pomoMode === 'study' ? 'bg-[#fef3c7] text-[#92400e]' : 'bg-emerald-100 text-emerald-800'}`}>
                        {pomoMode === 'study' ? 'Fokus Tugas' : 'Istirahat'}
                      </span>
                    </div>

                    <div className="flex gap-3">
                      <button 
                        onClick={() => setPomoActive(!pomoActive)} 
                        className={`flex-1 py-3.5 rounded-full text-sm font-bold transition flex justify-center items-center gap-2 shadow-md
                          ${pomoActive 
                            ? 'bg-rose-50 text-rose-700 hover:bg-rose-100' 
                            : 'bg-[#059669] text-white shadow-emerald-600/30 hover:bg-emerald-700'}`}
                      >
                        {pomoActive ? <Icon name="pause" className="w-4 h-4" /> : <Icon name="play" className="w-4 h-4" />} 
                        {pomoActive ? 'Jeda' : 'Mulai Fokus'}
                      </button>
                      <button 
                        onClick={() => { setPomoActive(false); setPomoTime(pomoMode === 'study' ? 25 * 60 : 5 * 60); }} 
                        className="p-3.5 border border-slate-200 rounded-full hover:bg-slate-50 text-slate-500 transition shadow-sm flex items-center justify-center"
                        title="Reset Timer"
                      >
                        <Icon name="refreshCw" className="w-4 h-4" />
                      </button>
                    </div>
                  </div>
                )}

                {/* Floating Kopi Icon (Bisa Diklik & Digeser) */}
                <div 
                  onMouseDown={handlePointerDown}
                  onTouchStart={handlePointerDown}
                  onClick={(e) => { if (!dragRef.current.moved) setPomoOpen(!pomoOpen); }}
                  className={`relative flex items-center justify-center px-4 py-4 rounded-full shadow-xl border cursor-grab active:cursor-grabbing transition-transform ${pomoActive && !pomoOpen ? 'bg-[#059669] border-[#059669] text-white animate-pulse shadow-emerald-200/50' : 'bg-white border-stone-200 text-[#059669] hover:scale-105 hover:bg-stone-50'}`}
                  title="Klik Buka Timer | Geser Pindah Posisi"
                >
                  <Icon name="coffee" className={`w-6 h-6 pointer-events-none ${pomoActive && !pomoOpen ? 'text-white' : 'text-[#059669]'}`} />
                  {/* Tampilkan sisa waktu di sebelah ikon jika timer sedang berjalan dan popup ditutup */}
                  {pomoActive && !pomoOpen && <span className="ml-2 font-mono font-bold text-[15px] pointer-events-none drop-shadow-sm">{formatPomoTime()}</span>}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
